<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی کافه پیدا</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        h2 { border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-top: 30px; color: #2c3e50; }
        .item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; }
        .price { font-weight: bold; color: #e67e22; }
        .footer { text-align: center; margin-top: 40px; font-size: 0.9em; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <h1>☕ کافه پیدا</h1>
    
    <!-- بخش نمونه برای شروع -->
    <h2>قهوه</h2>
    <div class="item"><span>اسپرسو</span> <span class="price">۱۱۵</span></div>
    <div class="item"><span>آمریکانو</span> <span class="price">۱۲۵</span></div>
    <div class="item"><span>کاپوچینو</span> <span class="price">۱۶۰</span></div>
    
    <h2>غذا و چاشت</h2>
    <div class="item"><span>برگر کلاسیک</span> <span class="price">۴۴۰</span></div>
    <div class="item"><span>پیدا برگر</span> <span class="price">۵۵۰</span></div>

    <div class="footer">
        <p>اینستاگرام: @Peydacafe</p>
        <p>رمز اینترنت: @Peyda_123</p>
    </div>
</div>

</body>
</html>
